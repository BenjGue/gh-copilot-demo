server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path serves index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the albums-api container.
    # The hostname `albums-api` is the service name defined in docker-compose.yml.
    # This avoids CORS and removes the need to bake the API URL into the Vite build.
    location /albums {
        proxy_pass         http://albums-api:3000/albums;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
